<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天</title>
    <!-- Use Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .chat-container {
            height: 70vh;
            overflow-y: auto;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-xl rounded-lg p-6 w-full max-w-2xl flex flex-col h-[85vh]">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">AI 对话</h1>

        <!-- Chat messages display area -->
        <div id="chat-box" class="chat-container bg-gray-100 p-4 mb-4 space-y-4 flex-1">
            <!-- Messages will be injected here by JavaScript -->
        </div>

        <!-- Input form -->
        <form id="chat-form" class="flex items-center space-x-2">
            <textarea id="user-input" rows="1" class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none overflow-hidden" placeholder="输入你的问题..."></textarea>
            <button type="submit" id="send-btn" class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold shadow-md hover:bg-indigo-700 transition-colors duration-200">
                发送
            </button>
        </form>
    </div>

    <script>
        // Get references to DOM elements
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');

        // Function to create and append a message to the chat box
        function appendMessage(sender, message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = `max-w-[75%] p-3 rounded-lg shadow-sm ${sender === 'user' ? 'bg-indigo-500 text-white' : 'bg-gray-200 text-gray-800'}`;
            contentDiv.innerText = message;

            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to the bottom
        }

        // Handle form submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent default form submission
            const userMessage = userInput.value.trim();
            if (!userMessage) return;

            // Display user's message
            appendMessage('user', userMessage);
            userInput.value = ''; // Clear the input box

            // Display a temporary loading message
            const loadingMessage = 'AI 正在思考...';
            appendMessage('ai', loadingMessage);

            // Disable button and input while waiting for response
            sendBtn.disabled = true;
            userInput.disabled = true;

            try {
                // Make a POST request to the Go backend
                const response = await fetch('http://localhost:8080/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: userMessage }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();

                // Remove the loading message and display the AI's response
                const lastMessage = chatBox.lastElementChild;
                lastMessage.remove(); // Remove loading message

                if (data.response) {
                    appendMessage('ai', data.response);
                } else {
                    throw new Error('Invalid response format from AI.');
                }
            } catch (error) {
                console.error('Error fetching AI response:', error);
                const lastMessage = chatBox.lastElementChild;
                lastMessage.remove(); // Remove loading message
                appendMessage('ai', '抱歉，服务出现错误。请稍后重试。');
            } finally {
                // Re-enable button and input
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        });

        // Automatically resize the textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });
    </script>
</body>
</html>
